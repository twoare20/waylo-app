```yml
name: waylo
description: WAYLO 국내 여행 AI 일정 추천 앱
version: 1.0.0+1

environment:
  sdk: ">=2.18.2 <3.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Material Design 3
  flutter/material.dart: ^1.0.0

  # 토스 스타일 UI
  google_fonts/google_fonts.dart: ^3.0.1

  # 지도 라이브러리
  flutter_map/flutter_map.dart: ^0.14.0

  # AI 엔진
  # tensorflow/tensorflow.dart: ^0.1.0 (미사용)

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^1.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: NotoSansKR
      fonts:
        - asset: assets/fonts/NotoSansKR-Bold.otf
        - asset: assets/fonts/NotoSansKR-Regular.otf
```