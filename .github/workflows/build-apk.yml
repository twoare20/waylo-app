name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Flutter 프로젝트 새로 생성
        run: flutter create -t app waylo_temp

      - name: AI 생성 코드로 덮어쓰기
        run: |
          cp pubspec.yaml waylo_temp/pubspec.yaml
          cp -r lib/* waylo_temp/lib/

      - name: 프로젝트 폴더로 이동
        run: cd waylo_temp

      - name: Install dependencies
        working-directory: waylo_temp
        run: flutter pub get

      - name: Build APK
        working-directory: waylo_temp
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: waylo-release
          path: waylo_temp/build/app/outputs/flutter-apk/app-release.apk
